### Prefix Key
unbind C-b
set -g prefix C-b
bind C-b send-prefix

### vi mode enable
set-window-option -g mode-keys vi

### scrollback
set -g history-limit 200000
set -g pane-border-status off
set -g remain-on-exit on

### Log all pane output
bind-key L pipe-pane -o "cat >> ~/tmux-pane.log" \; display-message "Toggled logging"

### Clear log without stopping
bind-key K run-shell "truncate -s 0 ~/tmux-pane.log" \; display-message "Log cleared"

### Clipboard (use with .bashrc osc52_copy function or similar)
set -s set-clipboard on
set -g allow-passthrough on

### Vim-style Pane Navigation (no prefix required)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

### Shift + Arrow Keys to Switch Windows
bind -n S-Left  previous-window
bind -n S-Right next-window
bind -n S-Up    select-window -t :1             # First window
bind -n S-Down  last-window                     # Last window

### Splitting Panes
bind s split-window -v -c "#{pane_current_path}"   # Horizontal split (top/bottom)
bind v split-window -h -c "#{pane_current_path}"   # Vertical split (side-by-side)

### New Window in Same Directory
bind c new-window -c "#{pane_current_path}"

### Set Window Indexing to Start at 1
set -g base-index 1
setw -g pane-base-index 1

### Enable Mouse Support
set -g mouse on

### Clean & Minimal Status Bar
set -g status on
set -g status-interval 5
set -g status-justify centre
set -g status-left-length 30
set -g status-right-length 100

# Status Bar Appearance
set -g status-style bg=default,fg=white

# Left: Session name
set -g status-left "#[fg=cyan,bold] #S #[default]"

# Right: Time, Date, Host
set -g status-right "#[fg=green]%H:%M #[fg=yellow]%d %b #[fg=blue]#(hostname -s)"

# Active Window Style
setw -g window-status-current-style bg=blue,fg=white
setw -g window-status-current-format " #I:#W "

# Inactive Window Style
setw -g window-status-style bg=default,fg=grey
setw -g window-status-format " #I:#W "

# Optional: Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"
