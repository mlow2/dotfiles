### Prefix Key
unbind C-b
set -g prefix C-b
bind C-b send-prefix

### vi mode enable
set-window-option -g mode-keys vi

### TUI / redraw hygiene: keep full-screen apps (vim, pagers, agent TUIs)
### correctly sized when reattaching or resizing over SSH. focus-events lets
### apps know when the pane gains/loses focus; aggressive-resize fits the pane
### to the smallest attached client; short escape-time avoids Esc lag in vi.
set -g focus-events on
setw -g aggressive-resize on
set -sg escape-time 10

### scrollback
set -g history-limit 200000
set -g pane-border-status off
set -g remain-on-exit on

### Log all pane output
bind-key L pipe-pane -o "cat >> ~/tmux-pane.log" \; display-message "Toggled logging"

### Clear log without stopping
bind-key K run-shell "truncate -s 0 ~/tmux-pane.log" \; display-message "Log cleared"

### Clipboard: let the `clip` command (OSC 52) reach the outer terminal.
### Needs tmux >= 3.3 for allow-passthrough (>= 2.6 for set-clipboard); older
### tmux will error on these lines. The outer terminal must also honor OSC 52
### (iTerm2 yes, Terminal.app no).
set -s set-clipboard on
set -g allow-passthrough on

### Vim-style Pane Navigation (Alt + h/j/k/l, no prefix required)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

### Shift + Arrow Keys to Switch Windows
bind -n S-Left  previous-window
bind -n S-Right next-window
bind -n S-Up    select-window -t :1             # First window
bind -n S-Down  last-window                     # Last window

### Splitting Panes
bind s split-window -v -c "#{pane_current_path}"   # Horizontal split (top/bottom)
bind v split-window -h -c "#{pane_current_path}"   # Vertical split (side-by-side)

### New Window in Same Directory
bind c new-window -c "#{pane_current_path}"

### Set Window Indexing to Start at 1
set -g base-index 1
setw -g pane-base-index 1

### Enable Mouse Support
set -g mouse on

### Clean & Minimal Status Bar
set -g status on
set -g status-interval 5
set -g status-justify centre
set -g status-left-length 30
set -g status-right-length 100

# Status Bar Appearance
set -g status-style bg=default,fg=white

# Left: Session name
set -g status-left "#[fg=cyan,bold] #S #[default]"

# Right: Time, Date, Host
set -g status-right "#[fg=green]%H:%M #[fg=yellow]%d %b #[fg=blue]#(hostname -s)"

# Active Window Style
setw -g window-status-current-style bg=blue,fg=white
setw -g window-status-current-format " #I:#W "

# Inactive Window Style
setw -g window-status-style bg=default,fg=grey
setw -g window-status-format " #I:#W "

# Optional: Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

### Identify the active pane: fade inactive panes + highlight the active border
# Background fade (chosen over iTerm transparency): inactive panes get an opaque
# grey fill so they clearly recede; the active pane stays dark.
# NOTE: do NOT use bg=default for the active pane - tmux resolves "default" by
# falling back to window-style, which greys the active pane too. Use explicit
# colors. Active bg=colour234 is near-black; bump it to match your theme exactly
# (colour232 = black, or 'bg=terminal' for the literal terminal default).
# Make the fade stronger with a lighter inactive bg (colour240) or weaker (235).
set -g window-active-style 'fg=colour253,bg=terminal'
set -g window-style        'fg=colour244,bg=colour238'
# Make the divider around the active pane pop (neon pink) vs dim grey elsewhere.
set -g pane-border-style        'fg=colour238'
set -g pane-active-border-style 'fg=colour198,bold'
# On-demand: prefix + q flashes big pane numbers; keep them up a bit longer.
set -g display-panes-time 2000

# Force a full client redraw if a TUI app gets out of sync with the pane size
# (rare, but cheaper than detach/attach). Generic; sends nothing to any process.
bind R refresh-client \; display-message "Client refreshed"
